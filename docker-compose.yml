services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mythrart
      POSTGRES_PASSWORD: mythrart
      POSTGRES_DB: mythrart
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mythrart
      MINIO_ROOT_PASSWORD: mythrart123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  minio_data: